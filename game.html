    <style>
        body {
            font-family: 'Inter', 'Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
            touch-action: manipulation;
        }
        .board { 
            display: grid;
            width: 100%;
            aspect-ratio: 1 / 1;
        }
        .cell { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .cell.light { background-color: #f0d9b5; }
        .cell.dark { background-color: #b58863; }
        .piece { position: absolute; width: 75%; height: 75%; border-radius: 50%; cursor: pointer; transition: all 0.2s ease-in-out; box-sizing: border-box; box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.5); }
        .piece.white { background: radial-gradient(circle at 50% 30%, #ffffff, #cccccc); border: 2px solid #888; }
        .piece.black { background: radial-gradient(circle at 50% 30%, #555555, #111111); border: 2px solid #000; }
        .cell.selected { outline: 3px solid #3b82f6; outline-offset: -3px; }
        .cell.valid-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30%; height: 30%; background-color: rgba(59, 130, 246, 0.7); border-radius: 50%; pointer-events: none; z-index: 10; }
        #modal { transition: opacity 0.3s ease, transform 0.3s ease; z-index: 50; }
        .replay-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .cell.increased::before, .cell.decreased::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; /* 駒よりは下、マスの色よりは上 */
            pointer-events: none;
        }
        .cell.increased::before {
            background-color: rgba(22, 163, 74, 0.4); /* 半透明の緑 */
        }
        .cell.decreased::before {
            background-color: rgba(220, 38, 38, 0.4); /* 半透明の赤 */
        }

        .kifu-scroll {
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
            mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
        }
        .kifu-scroll::-webkit-scrollbar { display: none; }
        #kifu-text { padding: 0 16px; }
        .kifu-move.kifu-active { background-color: #d1d5db; border-radius: 4px; }

        /* FLIPアニメーション用: transformの変化にだけtransitionをかける */
        .piece.piece-flip-transition {
            transition: transform 220ms ease, opacity 220ms ease;
        }
        .piece.piece-enter-fade {
            opacity: 0;
            transform: scale(0.4);
        }
        @media (prefers-reduced-motion: reduce) {
            .piece.piece-flip-transition,
            .piece.piece-enter-fade {
                transition: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- ヘッダーの読み込み場所 -->
    <div id="header-placeholder"></div>

    <main id="game-container" class="w-full max-w-xl mx-auto py-8 px-4 hidden">

     <div id="loading-container" class="text-center py-20">
        <p class="text-xl text-gray-600">対局データを読み込んでいます...</p>

    <!-- モーダル -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 opacity-0 scale-95">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-sm text-center">

            <div id="modal-content" class="mb-6"></div>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadHeader } from './js/header.js';
        import { loadFooter } from './js/footer.js';
        loadHeader();
        loadFooter();

        import { auth, database, functions } from './js/firebase.js';
        import { ref, get, onValue, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";
        import { requireAuthAndNickname } from './js/authGuard.js';

        // ローカル対局（CPUモード・オフラインのホットシート対戦）用: ゲームロジックを直接インポート
        import { simulateTurn, checkWinCondition, normalizeBoard, maxSummonsFor, computeTimersAfterTurn } from './js/gameLogic.js';

        const submitMove = httpsCallable(functions, 'submitMove');
        const claimTimeout = httpsCallable(functions, 'claimTimeout');
        const resignGame = httpsCallable(functions, 'resignGame');
        const offerDraw = httpsCallable(functions, 'offerDraw');
        const respondDraw = httpsCallable(functions, 'respondDraw');
        const endOfflineGame = httpsCallable(functions, 'endOfflineGame');
        const createGame = httpsCallable(functions, 'createGame');
        const createInvitation = httpsCallable(functions, 'createInvitation');

        // ニックネームなどユーザー入力を含む値を安全にリンク付きで表示するヘルパー
        // CPUモードでは uid が 'human' / 'cpu' の疑似IDになるため、リンクを生成しない
        function renderPlayerNameLink(el, uid, nickname, fallbackText) {
            el.textContent = '';
            if (!uid || uid === 'human' || uid === 'cpu') {
                el.textContent = nickname || fallbackText;
                return;
            }
            const link = document.createElement('a');
            link.href = `profile.html?uid=${encodeURIComponent(uid)}`;
            link.className = 'hover:underline';
            link.textContent = nickname;
            el.appendChild(link);
        }

        class GameManager {
            constructor() {
                this.gameData = null;
                this.currentTurnState = null;
                this.timerInterval = null;
                this.viewingTurnNumber = 0;
                this.previousViewingTurnNumber = -1; // -1で初期化し、初回読み込みと区別
                this.isInitialLoad = true; // 初回読み込みフラグ
                this.sounds = {
                    move: new Audio('sounds/move.mp3'),
                    end: new Audio('sounds/end.mp3')
                };
                this.uiGameState = 'IDLE';
                this.selectedCoords = null;
                this.lastMoveDest = null;
                this.actionMode = 'MOVE';
                this.gameId = null;
                this.mode = 'spectate'; // 'play' | 'spectate' | 'cpu'
                this.dbRef = null;
                this.turnStartBoardState = null;
                this.turnActions = [];
                this.activeTimerTurnNumber = -1;
                this.serverTimeOffset = 0;
                this.playerProfiles = { white: null, black: null };

                // CPUモード用プロパティ
                this.cpuColor = null;       // 'white' | 'black'
                this.humanColor = null;     // 'white' | 'black'
                this.cpuLevel = 2;          // 1 | 2 | 3
                this.cpuWorker = null;      // Worker インスタンス（一度作成して使い回す）
                this.cpuRequestId = 0;      // リクエストID（古い返答を無視するため）
                this.cpuThinking = false;   // CPU思考中フラグ（ボードクリックを無効化）
                this.cpuPersisted = false;  // true: Firebaseに保存されるCPU対局（ログイン済み）

                // ローカル対局（'cpu'モードで未ログイン、または'local'モード）は
                // Firebaseを使わずブラウザ内だけで完結する。
                this.isLocalOnlyGame = false;

                // handleDataUpdate の初回呼び出しフラグ
                this._handleDataUpdateCalled = false;
                // DB リスナーの unsubscribe 関数配列
                this._dbUnsubscribers = [];

                // 投了・引き分け・再戦機能用: 認証済みユーザーのuid
                this.myUid = null;
                // 直近に処理した drawOffer のtimestamp（重複表示防止用）
                this._lastHandledDrawOfferTimestamp = null;
                // 相手からの引き分け提案モーダルが開いているか
                this._drawOfferModalOpen = false;
                // 自分が出した引き分け提案が保留中か（render でドローボタンを触らないためのフラグ）
                this._myDrawOfferPending = false;
                // 再戦ボタンの多重クリック防止
                this._rematchInProgress = false;

                this.bindDOMElements();
                this.addEventListeners();
            }

            bindDOMElements() {
                this.dom = {
                    container: document.getElementById('game-container'),
                    loadingContainer: document.getElementById('loading-container'),
                    board: document.getElementById('board'),
                    turnIndicator: document.getElementById('turn-indicator'),
                    playerColorIndicator: document.getElementById('player-color-indicator'),
                    message: document.getElementById('message-area'),
                    whiteSummon: document.getElementById('white-summon-count'),
                    blackSummon: document.getElementById('black-summon-count'),
                    whiteTimer: document.getElementById('white-timer-display'),
                    blackTimer: document.getElementById('black-timer-display'),
                    endTurnBtn: document.getElementById('end-turn-button'),
                    cancelBtn: document.getElementById('cancel-button'),
                    actionModeToggle: document.getElementById('action-mode-toggle'),
                    exitBtnContainer: document.getElementById('exit-button-container'),
                    replayControls: document.getElementById('replay-controls'),
                    firstMoveBtn: document.getElementById('first-move-btn'),
                    prevMoveBtn: document.getElementById('prev-move-btn'),
                    nextMoveBtn: document.getElementById('next-move-btn'),
                    lastMoveBtn: document.getElementById('last-move-btn'),
                    turnDisplay: document.getElementById('turn-display'),
                    kifuText: document.getElementById('kifu-text'),
                    modal: document.getElementById('modal'),
                    modalTitle: document.getElementById('modal-title'),
                    modalContent: document.getElementById('modal-content'),
                    modalBtn: document.getElementById('modal-button'),
                    modalCancelBtn: document.getElementById('modal-cancel-button'),
                    shareGameId: document.getElementById('share-game-id'),
                    copyGameIdButton: document.getElementById('copy-game-id-button'),
                    shareSpectateUrl: document.getElementById('share-spectate-url'),
                    copySpectateButton: document.getElementById('copy-spectate-button'),
                    copyFeedbackFooter: document.getElementById('copy-feedback-footer'),
                    copyIdSection: document.getElementById('copy-id-section'),
                    gameActionSection: document.getElementById('game-action-section'),
                    gameActionButtons: document.getElementById('game-action-buttons'),
                    resignBtn: document.getElementById('resign-button'),
                    drawBtn: document.getElementById('draw-button'),
                    drawOfferStatus: document.getElementById('draw-offer-status'),
                    rematchBtn: document.getElementById('rematch-button'),
                };
            }

            async init() {
                const urlParams = new URLSearchParams(window.location.search);
                const modeParam = urlParams.get('mode');
                const idParam = urlParams.get('id');

                // ローカルのホットシート対戦（未ログインのオフライン対戦）: ログイン不要、Firebase 不使用
                if (modeParam === 'local') {
                    this.mode = 'local';
                    this.isLocalOnlyGame = true;
                    this.initLocalOfflineMode(urlParams);
                    return;
                }

                // CPUモードのうち、対局IDが無いもの = 未ログインのローカル対局（Firebase 不使用）
                if (modeParam === 'cpu' && !idParam) {
                    this.mode = 'cpu';
                    this.isLocalOnlyGame = true;
                    this.cpuPersisted = false;
                    this.initCpuMode(urlParams);
                    return;
                }

                this.gameId = idParam;
                if (modeParam === 'cpu') {
                    // CPUモードのうち、対局IDがあるもの = ログイン済みで保存されるCPU対局
                    this.mode = 'cpu';
                    this.cpuPersisted = true;
                } else {
                    this.mode = modeParam === 'play' ? 'play' : 'spectate';
                }

                if (!this.gameId) {
                    this.dom.loadingContainer.textContent = 'エラー: 対局IDが指定されていません。';
                    return;
                }

                onAuthStateChanged(auth, async (user) => {
                    this.myUid = user ? user.uid : null;

                    if (this.mode === 'spectate') {
                        // 観戦モードは未ログインでも閲覧できる仕様のため対象外
                        this.loadGameData(user);
                        return;
                    }

                    if (!(await requireAuthAndNickname(user, database))) return;
                    this.loadGameData(user);
                });
            }

            /**
             * 投了・引き分け提案・再戦の対象となる「本当の2人対戦オンライン対局」かどうかを判定する。
             * CPU対局・オフラインのホットシート対戦・観戦は対象外。
             */
            isRealOnlineGame() {
                return this.mode === 'play' &&
                    !!this.gameData?.meta?.players &&
                    this.gameData.meta.players.white !== this.gameData.meta.players.black;
            }

            /**
             * ホットシート（同一端末での2人オフライン対戦）かどうか。
             * - 未ログイン: mode === 'local'
             * - ログイン済み(gameType=offline): mode === 'play' かつ白と黒が同一ユーザー
             */
            isHotseatGame() {
                if (this.mode === 'local') return true;
                return this.mode === 'play' &&
                    !!this.gameData?.meta?.players &&
                    this.gameData.meta.players.white === this.gameData.meta.players.black;
            }

            /** DBに保存されるホットシート対局か（ログイン済みオフライン）。 */
            isPersistedHotseat() {
                return this.mode === 'play' && this.isHotseatGame();
            }

            /**
             * ホットシート対局を終了させる。
             * winner: 'white'|'black'（投了）または null（引き分け）。
             * 保存対局は Cloud Function、未ログインlocalはクライアント側で確定する。
             */
            async finishHotseat(winner, reason) {
                if (this.isPersistedHotseat()) {
                    try {
                        await endOfflineGame({ gameId: this.gameId, result: winner ?? 'draw' });
                        // 画面更新は meta の onValue リスナー経由で自動反映される
                    } catch (error) {
                        console.error('Failed to end offline game:', error);
                        this.setMessage(error.message || '対局の終了に失敗しました。');
                    }
                } else {
                    this.finalizeLocalOutcome(winner, reason);
                }
            }

            /** 自分の手番の色（'white'|'black'|null）を返す。 */
            getMyColor() {
                if (!this.gameData?.meta?.players || !this.myUid) return null;
                const { white, black } = this.gameData.meta.players;
                if (this.myUid === white) return 'white';
                if (this.myUid === black) return 'black';
                return null;
            }

            /** 相手プレイヤーの色・uidを返す。 */
            getOpponentInfo() {
                const myColor = this.getMyColor();
                if (!myColor) return { color: null, uid: null };
                const opponentColor = myColor === 'white' ? 'black' : 'white';
                return { color: opponentColor, uid: this.gameData.meta.players[opponentColor] };
            }

            // URLパラメータから時間設定を読み取る共通ヘルパー。
            // 対局作成フォームで設定された内容をローカル対局(CPU/オフライン)にも反映する。
            parseTimeControlParams(urlParams) {
                const enabled = urlParams.get('timeEnabled') === '1';
                if (!enabled) return { enabled: false, timeLimit: 0, delay: 0 };

                const timeLimitMinutes = parseInt(urlParams.get('timeLimit')) || 5;
                const delay = parseInt(urlParams.get('delay')) || 0;
                return {
                    enabled: true,
                    timeLimit: Math.max(1, timeLimitMinutes) * 60,
                    delay: Math.max(0, delay),
                };
            }

            /**
             * CPUモード（未ログイン・ローカル対局）の初期化。
             * URLパラメータ: level=1|2|3, size=3..8, color=white|black|random,
             *                timeEnabled=0|1, timeLimit=分, delay=秒
             */
            initCpuMode(urlParams) {
                // パラメータ解析
                const levelParam = parseInt(urlParams.get('level')) || 2;
                this.cpuLevel = (levelParam >= 1 && levelParam <= 3) ? levelParam : 2;

                const sizeParam = parseInt(urlParams.get('size')) || 4;
                const boardSize = Math.max(3, Math.min(8, sizeParam));

                const colorParam = urlParams.get('color') || 'random';
                const resolvedColor = colorParam === 'random'
                    ? (Math.random() < 0.5 ? 'white' : 'black')
                    : (colorParam === 'white' ? 'white' : 'black');
                this.humanColor = resolvedColor;
                this.cpuColor = resolvedColor === 'white' ? 'black' : 'white';

                const timeControl = this.parseTimeControlParams(urlParams);

                // CPUレベル名（表示用）
                const levelNames = { 1: 'よわい', 2: 'ふつう', 3: 'つよい' };
                const cpuNickname = `CPU (${levelNames[this.cpuLevel] || 'ふつう'})`;

                // プレイヤー情報設定
                const humanNickname = 'あなた';
                this.playerProfiles.white = { nickname: this.humanColor === 'white' ? humanNickname : cpuNickname };
                this.playerProfiles.black = { nickname: this.humanColor === 'black' ? humanNickname : cpuNickname };

                const maxSummons = maxSummonsFor(boardSize);

                // 空の盤面（denormalized: 空セルは0）を生成
                const emptyBoard = [];
                for (let r = 0; r < boardSize; r++) {
                    const row = [];
                    for (let c = 0; c < boardSize; c++) {
                        row.push(0);
                    }
                    emptyBoard.push(row);
                }

                // 初期 gameData を構築
                this.gameId = 'cpu-local';
                this.gameData = {
                    gameId: 'cpu-local',
                    meta: {
                        status: 'in_progress',
                        players: {
                            white: this.humanColor === 'white' ? 'human' : 'cpu',
                            black: this.humanColor === 'black' ? 'human' : 'cpu',
                        },
                        winner: null,
                        winReason: null,
                        gameSettings: {
                            boardSize,
                            maxSummons,
                            timeControl,
                        },
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                    },
                    moves: [{
                        turnNumber: 0,
                        currentPlayer: 'white', // 白が先手
                        board: emptyBoard,
                        summonCounts: { white: 0, black: 0 },
                        timers: { white: timeControl.timeLimit, black: timeControl.timeLimit },
                        timestamp: Date.now(),
                    }],
                };

                // 共有セクションをCPUモードでは非表示にする
                if (this.dom.copyIdSection) this.dom.copyIdSection.style.display = 'none';

                this.setupCpuWorker();

                // 通常のレンダリングパスに入る
                this.handleDataUpdate(this.gameData);
            }

            /**
             * ローカルのオフライン対戦（未ログイン・2人ホットシート）の初期化。
             * URLパラメータ: size=3..8, timeEnabled=0|1, timeLimit=分, delay=秒
             */
            initLocalOfflineMode(urlParams) {
                const sizeParam = parseInt(urlParams.get('size')) || 4;
                const boardSize = Math.max(3, Math.min(8, sizeParam));
                const timeControl = this.parseTimeControlParams(urlParams);
                const maxSummons = maxSummonsFor(boardSize);

                this.playerProfiles.white = { nickname: 'プレイヤー1 (白)' };
                this.playerProfiles.black = { nickname: 'プレイヤー2 (黒)' };

                const emptyBoard = [];
                for (let r = 0; r < boardSize; r++) {
                    const row = [];
                    for (let c = 0; c < boardSize; c++) {
                        row.push(0);
                    }
                    emptyBoard.push(row);
                }

                this.gameId = 'local-offline';
                this.gameData = {
                    gameId: 'local-offline',
                    meta: {
                        status: 'in_progress',
                        players: { white: 'human', black: 'human' },
                        winner: null,
                        winReason: null,
                        gameSettings: {
                            boardSize,
                            maxSummons,
                            timeControl,
                        },
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                    },
                    moves: [{
                        turnNumber: 0,
                        currentPlayer: 'white',
                        board: emptyBoard,
                        summonCounts: { white: 0, black: 0 },
                        timers: { white: timeControl.timeLimit, black: timeControl.timeLimit },
                        timestamp: Date.now(),
                    }],
                };

                if (this.dom.copyIdSection) this.dom.copyIdSection.style.display = 'none';

                this.handleDataUpdate(this.gameData);
            }

            /** CPU用のWorkerを一度だけ生成する。 */
            setupCpuWorker() {
                if (this.cpuWorker) return;
                this.cpuWorker = new Worker('js/ai/aiWorker.js', { type: 'module' });
                this.cpuWorker.onmessage = (event) => this.handleWorkerMessage(event.data);
                this.cpuWorker.onerror = (err) => {
                    console.error('AI Worker error:', err);
                    this.cpuThinking = false;
                    this.setMessage('CPUエラーが発生しました。');
                };
            }

            loadGameData(user) {
                // リスナーのデタッチ用: unsubscribe 関数を配列で管理する
                this._dbUnsubscribers = [];

                // .info/serverTimeOffset リスナー（既存のまま）
                const offsetRef = ref(database, '.info/serverTimeOffset');
                const unsubOffset = onValue(offsetRef, (snap) => {
                    this.serverTimeOffset = snap.val() || 0;
                });
                this._dbUnsubscribers.push(unsubOffset);

                // hydration 用の内部状態
                // metaが届く前に moves が届いた場合のバッファ
                this._pendingMoves = {};
                // 出力済みの turnNumber セット（重複排除）
                this._hydratedTurnNumbers = new Set();
                // handleDataUpdate の debounce タイマー ID
                this._hydrationRafId = null;
                // 初回 meta が届いたかどうか
                this._metaReady = false;

                // 全リスナーを一括デタッチするヘルパー
                this._detachAllListeners = () => {
                    for (const unsub of this._dbUnsubscribers) {
                        unsub();
                    }
                    this._dbUnsubscribers = [];
                };

                // ── 1. meta ノードを購読 ──────────────────────────────────
                const metaRef = ref(database, 'games/' + this.gameId + '/meta');
                const unsubMeta = onValue(metaRef, async (snapshot) => {
                    if (!snapshot.exists()) {
                        // meta が存在しない = 対局が見つからない
                        this.dom.loadingContainer.textContent = 'エラー: 指定された対局が見つかりません。';
                        this._detachAllListeners();
                        return;
                    }

                    const meta = snapshot.val();
                    const uid = user ? user.uid : null;

                    // 初回のみ: 参加者チェック
                    if (!this._metaReady) {
                        if (this.mode === 'play' || (this.mode === 'cpu' && this.cpuPersisted)) {
                            if (!uid) {
                                this.dom.loadingContainer.textContent = 'エラー: この対局をプレイするにはログインが必要です。';
                                this.dom.container.classList.add('hidden');
                                this._detachAllListeners();
                                return;
                            }
                            const players = meta.players;
                            const isParticipant = uid === players.white || uid === players.black;
                            if (!isParticipant) {
                                this.dom.loadingContainer.textContent = 'エラー: この対局の参加者ではありません。観戦モードでアクセスしてください。';
                                this.dom.container.classList.add('hidden');
                                this._detachAllListeners();
                                return;
                            }
                        }

                        // 初回: gameData を初期化
                        this.gameData = { meta, moves: [] };
                        this._metaReady = true;

                        // meta 到着前にバッファされた moves をドレインする
                        this._drainPendingMoves();
                    } else {
                        // 2回目以降: meta だけ更新して再描画
                        this.gameData.meta = meta;
                        this._scheduleHandleDataUpdate();
                    }
                }, (error) => {
                    console.error("Database meta read failed:", error);
                    this.dom.loadingContainer.textContent = 'エラー: データベースの読み込みに失敗しました。';
                });
                this._dbUnsubscribers.push(unsubMeta);

                // ── 2. moves ノードを onChildAdded で購読（hydration レイヤー）──
                const movesRef = ref(database, 'games/' + this.gameId + '/moves');
                const unsubMoves = onChildAdded(movesRef, (childSnap) => {
                    const entry = childSnap.val();
                    if (!entry) return;

                    if (!this._metaReady) {
                        // meta がまだ届いていない場合はバッファ
                        this._pendingMoves[entry.turnNumber] = entry;
                        return;
                    }

                    this._hydrateAndAppend(entry);
                });
                this._dbUnsubscribers.push(unsubMoves);

                // ── 3. drawOffer ノードを購読（本当の2人対戦オンライン対局のみ意味を持つ）──
                // mode==='play' でない場合（CPU/観戦）は無視して構わないため、
                // リスナー自体は張るが handleDrawOfferSnapshot 内でガードする。
                if (this.mode === 'play') {
                    const drawOfferRef = ref(database, 'games/' + this.gameId + '/drawOffer');
                    const unsubDrawOffer = onValue(drawOfferRef, (snapshot) => {
                        this.handleDrawOfferSnapshot(snapshot.exists() ? snapshot.val() : null);
                    });
                    this._dbUnsubscribers.push(unsubDrawOffer);
                }
            }

            /**
             * /games/{id}/drawOffer の変化を処理する。
             * - 相手からの提案 → 承諾/拒否モーダルを表示（同じ提案を二重表示しない）
             * - 自分が出した提案 → 「提案中」インジケータを表示
             * - null（取り下げ・応答済み・手が指された） → インジケータ/モーダルをクリア
             */
            handleDrawOfferSnapshot(offer) {
                if (!this.isRealOnlineGame()) return;

                if (!offer) {
                    this._lastHandledDrawOfferTimestamp = null;
                    this._myDrawOfferPending = false;
                    this.dom.drawOfferStatus.classList.add('hidden');
                    this.dom.drawOfferStatus.textContent = '';
                    this.dom.drawBtn.disabled = false;
                    this.dom.drawBtn.textContent = '引き分け提案';
                    if (this._drawOfferModalOpen) {
                        this.hideModal();
                        this._drawOfferModalOpen = false;
                    }
                    return;
                }

                if (offer.byUid === this.myUid) {
                    // 自分が提案した側: 「提案中」表示のみ
                    this._myDrawOfferPending = true;
                    this.dom.drawOfferStatus.classList.remove('hidden');
                    this.dom.drawOfferStatus.textContent = '引き分けを提案中…';
                    this.dom.drawBtn.disabled = true;
                    this.dom.drawBtn.textContent = '提案中…';
                    return;
                }

                this._myDrawOfferPending = false;
                // 相手からの提案: 同じ提案をすでに処理済みならスキップ（重複表示防止）
                if (this._lastHandledDrawOfferTimestamp === offer.timestamp) return;
                this._lastHandledDrawOfferTimestamp = offer.timestamp;

                this._drawOfferModalOpen = true;
                this.showModal(
                    '引き分けの提案',
                    '<p>相手が引き分けを提案しました。承諾しますか？</p>',
                    async () => {
                        this._drawOfferModalOpen = false;
                        try {
                            await respondDraw({ gameId: this.gameId, accept: true });
                        } catch (error) {
                            console.error('Failed to accept draw:', error);
                            this.setMessage(error.message || '引き分けの応答に失敗しました。');
                        }
                    },
                    {
                        confirmLabel: '承諾',
                        cancelLabel: '拒否',
                        onCancel: async () => {
                            this._drawOfferModalOpen = false;
                            try {
                                await respondDraw({ gameId: this.gameId, accept: false });
                            } catch (error) {
                                console.error('Failed to decline draw:', error);
                                this.setMessage(error.message || '引き分けの応答に失敗しました。');
                            }
                        },
                    }
                );
            }

            /**
             * DB エントリ 1 件を完全な状態オブジェクトに変換して this.gameData.moves に追記する。
             * - board が含まれる場合（旧形式 / moves/0）: そのまま使用。
             * - board が含まれない場合（新形式 n>=1）: 直前の状態から simulateTurn で復元する。
             * 重複・順序外到着は pendingMoves バッファで吸収する。
             */
            _hydrateAndAppend(entry) {
                const tn = entry.turnNumber;

                // 重複排除
                if (this._hydratedTurnNumbers.has(tn)) return;

                // 順序外チェック: 直前の状態がまだない場合はバッファ
                if (tn > 0 && this.gameData.moves.length < tn) {
                    this._pendingMoves[tn] = entry;
                    return;
                }

                let fullState;
                if (entry.board !== undefined) {
                    // 旧形式 または moves/0: board が含まれる → そのまま使用
                    fullState = {
                        turnNumber: tn,
                        currentPlayer: entry.currentPlayer,
                        board: entry.board,
                        summonCounts: entry.summonCounts || { white: 0, black: 0 },
                        timers: entry.timers,
                        timestamp: entry.timestamp,
                    };
                } else {
                    // 新形式 (n>=1): 直前の完全状態から盤面を復元する
                    const prev = this.gameData.moves[tn - 1];
                    const { boardSize } = this.gameData.meta.gameSettings;
                    try {
                        const stateForSim = {
                            board: normalizeBoard(prev.board, boardSize),
                            summonCounts: { ...prev.summonCounts },
                            currentPlayer: prev.currentPlayer,
                            boardSize,
                        };
                        const result = simulateTurn(stateForSim, entry.actions);
                        fullState = {
                            turnNumber: tn,
                            currentPlayer: entry.currentPlayer,
                            board: result.board,
                            summonCounts: result.summonCounts,
                            timers: entry.timers,
                            timestamp: entry.timestamp,
                        };
                    } catch (err) {
                        console.error(`手番 ${tn} の hydration に失敗しました:`, err);
                        return;
                    }
                }

                this.gameData.moves[tn] = fullState;
                this._hydratedTurnNumbers.add(tn);

                // debounce して再描画をまとめる
                this._scheduleHandleDataUpdate();

                // バッファに次の手番があればドレインする
                if (this._pendingMoves[tn + 1]) {
                    const next = this._pendingMoves[tn + 1];
                    delete this._pendingMoves[tn + 1];
                    this._hydrateAndAppend(next);
                }
            }

            /**
             * meta 到着前にバッファされた pendingMoves を順番に処理する。
             */
            _drainPendingMoves() {
                // turnNumber 順にソートして処理
                const pending = Object.values(this._pendingMoves).sort((a, b) => a.turnNumber - b.turnNumber);
                this._pendingMoves = {};
                for (const entry of pending) {
                    this._hydrateAndAppend(entry);
                }
            }

            /**
             * handleDataUpdate を setTimeout(0) でデバウンスして呼ぶ。
             * 初期ロード中の 100 手分を 1 回にまとめ、対局中の 1 手は即座に反映される。
             * (requestAnimationFrame はバックグラウンドタブで発火しないため使わない)
             */
            _scheduleHandleDataUpdate() {
                if (this._hydrationRafId !== null) return; // 既にスケジュール済み
                this._hydrationRafId = setTimeout(() => {
                    this._hydrationRafId = null;
                    if (this.gameData) {
                        this.handleDataUpdate(this.gameData);
                    }
                }, 0);
            }
            
            async handleDataUpdate(data) {
                // ローカル対局・commitTurnLocally からの呼び出し: data を直接セット
                // オンライン対局: loadGameData が this.gameData を管理するため、data === this.gameData
                // _handleDataUpdateCalled フラグで「初回呼び出し」を判定する（ローカル/オンライン共通）
                const wasFirstLoad = !this._handleDataUpdateCalled;
                this._handleDataUpdateCalled = true;
                this.gameData = data;

                // Bug2修正: CPUモードで、確定済み状態が人間のターンを示している場合は
                // cpuThinking を即座にリセットして最初のレンダリングからUI操作を有効化する。
                // （submitCpuMove の await 中に onValue が発火し、cpuThinking=true のまま
                //   レンダリングされてトグルが隠れる問題を防ぐ）
                if (this.mode === 'cpu' && this.gameData.meta?.status === 'in_progress') {
                    // moves は常に配列（ローカル/オンライン共通）
                    const movesArr = this.gameData.moves;
                    if (movesArr && movesArr.length > 0) {
                        const latestMove = movesArr[movesArr.length - 1];
                        if (latestMove && latestMove.currentPlayer === this.humanColor) {
                            this.cpuThinking = false;
                        }
                    }
                }

                // 初回読み込み時にプレイヤー情報を取得
                // ローカル対局(CPU/オフライン)では init 時に既に設定済みのためスキップ
                if (wasFirstLoad && this.mode === 'cpu' && this.cpuPersisted) {
                    // 保存されるCPU対局: gameSettings.cpu からCPUの色・強さを復元し、
                    // 人間側のプロフィールだけFirebaseから取得、CPU側は合成する。
                    const cpuMeta = this.gameData.meta.gameSettings.cpu || { level: 2, color: 'black' };
                    this.cpuLevel = cpuMeta.level;
                    this.cpuColor = cpuMeta.color;
                    this.humanColor = this.cpuColor === 'white' ? 'black' : 'white';

                    const levelNames = { 1: 'よわい', 2: 'ふつう', 3: 'つよい' };
                    const humanUid = this.gameData.meta.players[this.humanColor];
                    this.playerProfiles[this.humanColor] = await this.fetchUserProfile(humanUid);
                    this.playerProfiles[this.cpuColor] = { nickname: `CPU (${levelNames[this.cpuLevel] || 'ふつう'})` };

                    this.setupCpuWorker();
                } else if (wasFirstLoad && !this.isLocalOnlyGame) {
                    const { white: whiteUid, black: blackUid } = this.gameData.meta.players;
                    if (whiteUid) {
                        this.playerProfiles.white = await this.fetchUserProfile(whiteUid);
                    }
                    if (blackUid && blackUid !== whiteUid) { // オンライン対戦で黒プレイヤーが違う場合
                        this.playerProfiles.black = await this.fetchUserProfile(blackUid);
                    } else if (blackUid === whiteUid) { // オフライン対戦
                        this.playerProfiles.black = this.playerProfiles.white;
                    }
                }

                if (this.dom.container.classList.contains('hidden')) {
                     this.dom.loadingContainer.style.display = 'none';
                     this.dom.container.classList.remove('hidden');
                }

                // 常に最新の状態を読み込むように修正
                this.loadLatestState();

                // --- ゲーム終了状態を検知してモーダルを表示 ---
                if (this.gameData.meta.status === 'completed' && this.uiGameState !== 'ENDED') {
                    playSound(this.sounds.end);
                    const winner = this.gameData.meta.winner;
                    const reason = this.gameData.meta.winReason;
                    const title = winner ? `${winner === 'white' ? '白' : '黒'}の勝利！` : '引き分け';
                    this.showModal(title, reason);
                    // 繰り返し表示されないようにUIの状態を更新
                    this.uiGameState = 'ENDED';
                }

                // CPUモード: ゲーム進行中かつCPUの手番であればCPUに思考させる
                if (this.mode === 'cpu' && this.gameData.meta.status === 'in_progress') {
                    const latestMove = this.gameData.moves[this.gameData.moves.length - 1];
                    if (latestMove.currentPlayer === this.cpuColor) {
                        this.triggerCpuTurn();
                    }
                }
            }

            loadLatestState() {
                if (!this.gameData) return;

                // 共有情報の表示は状態に関わらず常に必要なため、早期returnより前に設定する
                // this.gameId はローカル/オンライン共通で常に設定済み
                const displayGameId = this.gameId || this.gameData.gameId || '';
                // 対局ID（UUID）。6文字コードは対局開始時に無効化されるためIDで共有する
                this.dom.shareGameId.textContent = displayGameId;
                // 観戦リンクはUUIDベース（対局開始後もコードに依存せず必ず開ける）
                this.dom.shareSpectateUrl.textContent =
                    `${location.origin}/spectate.html?id=${displayGameId}`;

                // ゲームが既に終了している場合、UIの状態をリセットせずに終了する
                if (this.gameData.meta.status === 'completed') {
                    // Bug4修正: 最終手の盤面を表示するために viewingTurnNumber を最新手に合わせる。
                    // moves は常に配列（ローカル/オンライン共通）
                    const completedMoves = this.gameData.moves || [];
                    if (completedMoves.length > 0) {
                        this.viewingTurnNumber = completedMoves.length - 1;
                    }
                    this.render(); // 盤面の再描画のみ行う
                    return;
                }

                // moves は常に配列のため Object.values 変換は不要（互換性のため残す）
                if (this.gameData.moves && !Array.isArray(this.gameData.moves)) {
                    this.gameData.moves = Object.values(this.gameData.moves);
                }

                if (!this.gameData.moves || this.gameData.moves.length === 0) {
                    this.dom.loadingContainer.style.display = 'block';
                    this.dom.container.classList.add('hidden');
                    this.dom.loadingContainer.textContent = 'エラー: 対局データに手番情報がありません。';
                    return;
                }
                
                this.viewingTurnNumber = this.gameData.moves.length - 1;
                this.currentTurnState = JSON.parse(JSON.stringify(this.gameData.moves[this.viewingTurnNumber]));

                this.turnStartBoardState = JSON.parse(JSON.stringify(this.currentTurnState.board));
                this.turnActions = [];

                this.uiGameState = 'IDLE';
                this.selectedCoords = null;
                this.lastMoveDest = null;
                this.actionMode = 'MOVE';
                document.querySelectorAll('input[name="actionMode"]').forEach(radio => radio.checked = radio.value === 'MOVE');
                
                if (this.gameData.meta.gameSettings.timeControl.enabled && this.gameData.meta.status === 'in_progress') {
                    this.startTimer();
                }
                
                this.render();
            }

            render() {
                // 初回読み込み時でなく、かつ表示手数が前回から変わっていれば音を鳴らす
                if (!this.isInitialLoad && this.viewingTurnNumber !== this.previousViewingTurnNumber) {
                    //playSound(this.sounds.move); 一時的にmove音は止める
                }

                // renderBoard内でFLIPアニメーションの要否を判定するため、
                // previousViewingTurnNumber/isInitialLoadを更新する前に判定結果を確定させておく
                const animateThisRender = this.shouldAnimateBoard();

                this.previousViewingTurnNumber = this.viewingTurnNumber;
                this.isInitialLoad = false; // 最初の描画が終わったらフラグを下ろす

                if (!this.gameData || !this.gameData.moves) return;
                const stateToRender = this.uiGameState === 'IDLE' ? this.gameData.moves[this.viewingTurnNumber] : this.currentTurnState;
                if (!stateToRender) return;

                this.renderBoard(stateToRender.board, animateThisRender);
                this.updateInfo();
                this.highlight();
                this.updateReplayControls();
                this.renderKifu();
            }

            // 2つの盤面を比較し、駒が減ったマス→増えたマスの順に座標を並べた棋譜トークンを生成する
            diffToNotation(boardBefore, boardAfter, boardSize) {
                const stackLength = (board, r, c) => {
                    const cell = board?.[r]?.[c];
                    return Array.isArray(cell) ? cell.length : 0;
                };
                const toCoord = (r, c) => `${String.fromCharCode(97 + c)}${boardSize - r}`;

                const decreased = [];
                const increased = [];
                for (let r = 0; r < boardSize; r++) {
                    for (let c = 0; c < boardSize; c++) {
                        const delta = stackLength(boardAfter, r, c) - stackLength(boardBefore, r, c);
                        if (delta < 0) decreased.push({ r, c, mag: -delta });
                        else if (delta > 0) increased.push({ r, c, mag: delta });
                    }
                }

                const toToken = ({ r, c, mag }) => (mag >= 2 ? mag : '') + toCoord(r, c);
                return [...decreased, ...increased].map(toToken).join('');
            }

            // 棋譜を「N.」ラベルと、盤面インデックスに対応付けた半手ごとの<span>で組み立てる
            buildKifuHTML() {
                const moves = this.gameData.moves;
                const { boardSize } = this.gameData.meta.gameSettings;
                const halfMoves = [];
                for (let i = 1; i < moves.length; i++) {
                    halfMoves.push(this.diffToNotation(moves[i - 1].board, moves[i].board, boardSize));
                }

                const parts = [];
                for (let i = 0; i < halfMoves.length; i += 2) {
                    const turnNumber = i / 2 + 1;
                    parts.push(`<span class="kifu-turn-num">${turnNumber}.</span>`);
                    parts.push(`<span class="kifu-move" data-half-index="${i}">${halfMoves[i] || ''}</span>`);
                    if (halfMoves[i + 1] !== undefined) {
                        parts.push(`<span class="kifu-move" data-half-index="${i + 1}">${halfMoves[i + 1]}</span>`);
                    }
                }
                return parts.join(' ');
            }

            // halfMoves[k]はmoves[k+1]の盤面を生んだ手に対応するため、
            // 現在表示中のviewingTurnNumberに追従させるにはインデックスを1つずらす
            renderKifu() {
                this.dom.kifuText.innerHTML = this.buildKifuHTML();
                const activeIndex = this.viewingTurnNumber - 1;
                const activeEl = this.dom.kifuText.querySelector(`.kifu-move[data-half-index="${activeIndex}"]`);
                if (activeEl) {
                    activeEl.classList.add('kifu-active');
                    activeEl.scrollIntoView({ block: 'nearest', inline: 'center' });
                }
            }

            /**
             * FLIPアニメーション対象かどうかを判定する。
             * - 初回読み込み時は対象外（テレポート表示でよい）
             * - 表示ターンが直前から+1で進んだ場合（最新手が指された/次の手へ進んだ場合）のみ対象
             * - reduced motion 設定時は対象外
             */
            shouldAnimateBoard() {
                if (this.isInitialLoad) return false;
                if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return false;
                return this.viewingTurnNumber === this.previousViewingTurnNumber + 1;
            }

            renderBoard(boardData, animate = false) {
                const boardSize = this.gameData.meta.gameSettings.boardSize;

                // --- FLIP: 再描画前に、既存の駒の位置を記録する ---
                // キー = "r-c-stackIndex"（セルの座標 + スタック内インデックス）
                const oldRects = new Map();
                let decreasedCellCenters = []; // 移動元候補（駒が消えたマス）の中心座標
                if (animate) {
                    this.dom.board.querySelectorAll('.cell').forEach(cell => {
                        const r = cell.dataset.r, c = cell.dataset.c;
                        const pieces = cell.querySelectorAll('.piece');
                        pieces.forEach((piece, i) => {
                            oldRects.set(`${r}-${c}-${i}`, piece.getBoundingClientRect());
                        });
                        if (cell.classList.contains('decreased')) {
                            const rect = cell.getBoundingClientRect();
                            decreasedCellCenters.push({ x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
                        }
                    });
                }

                this.dom.board.innerHTML = '';
                this.dom.board.style.gridTemplateColumns = `repeat(${boardSize}, 1fr)`;
                this.dom.board.style.gridTemplateRows = `repeat(${boardSize}, 1fr)`;

                // 比較対象となる1つ前の盤面データを取得
                const previousBoardData = this.viewingTurnNumber > 0
                    ? this.gameData.moves[this.viewingTurnNumber - 1].board
                    : null;

                // アニメーション対象の新規駒を後で処理するための一覧
                const newPieceEntries = []; // { el, key, isIncreasedCell }

                for (let r = 0; r < boardSize; r++) {
                    for (let c = 0; c < boardSize; c++) {
                        const cell = document.createElement('div');
                        cell.dataset.r = r; cell.dataset.c = c;
                        cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;

                        // 前のターンと比較して駒の数を比較し、クラスを付与
                        const currentTurnCommittedBoard = this.gameData.moves[this.viewingTurnNumber].board;
                        let isIncreasedCell = false;
                        if (previousBoardData) {
                            const currentStack = Array.isArray(currentTurnCommittedBoard[r]?.[c]) ? currentTurnCommittedBoard[r][c] : [];
                            const previousStack = Array.isArray(previousBoardData[r]?.[c]) ? previousBoardData[r][c] : [];
                            if (currentStack.length > previousStack.length) {
                                cell.classList.add('increased');
                                isIncreasedCell = true;
                            } else if (currentStack.length < previousStack.length) {
                                cell.classList.add('decreased');
                            }
                        }

                        const stack = Array.isArray(boardData[r]?.[c]) ? boardData[r][c] : [];
                        stack.forEach((pieceColor, i) => {
                            const piece = document.createElement('div');
                            piece.className = `piece ${pieceColor}`;
                            const stackOffset = `translateY(${-i * 8}px)`;
                            piece.style.transform = stackOffset;
                            piece.style.zIndex = i + 1;
                            cell.appendChild(piece);

                            if (animate) {
                                newPieceEntries.push({ el: piece, key: `${r}-${c}-${i}`, isIncreasedCell, stackOffset });
                            }
                        });
                        this.dom.board.appendChild(cell);
                    }
                }

                if (animate && newPieceEntries.length > 0) {
                    this.animatePieceEntries(newPieceEntries, oldRects, decreasedCellCenters);
                }
            }

            /**
             * FLIPアニメーション本体。
             * 同じキー(r-c-stackIndex)の駒が前フレームから位置を変えていれば、
             * 旧位置からnatural位置へtransitionさせる。
             * 新規に出現した駒（増加マス）は、直近の減少マスからスライドイン、
             * なければフェード＋スケールインで登場させる。
             */
            animatePieceEntries(newPieceEntries, oldRects, decreasedCellCenters) {
                // まず新しい位置を記録
                const prepared = newPieceEntries.map(entry => {
                    const newRect = entry.el.getBoundingClientRect();
                    const oldRect = oldRects.get(entry.key);
                    return { ...entry, newRect, oldRect };
                });

                // FLIPの「invert」ステップ: 旧位置に見えるよう即座に逆変換をかける（transitionなし）
                prepared.forEach(({ el, oldRect, newRect, isIncreasedCell, stackOffset }) => {
                    if (oldRect) {
                        // 既存位置からの移動（同キーのピースが移動した）
                        const dx = oldRect.left - newRect.left;
                        const dy = oldRect.top - newRect.top;
                        if (dx !== 0 || dy !== 0) {
                            el.style.transform = `translate(${dx}px, ${dy}px) ${stackOffset}`;
                        }
                    } else if (isIncreasedCell) {
                        // 新規出現駒: 直近の減少マス中心からスライドイン、なければフェード
                        const centerX = newRect.left + newRect.width / 2;
                        const centerY = newRect.top + newRect.height / 2;
                        let nearest = null;
                        let nearestDist = Infinity;
                        for (const center of decreasedCellCenters) {
                            const dist = (center.x - centerX) ** 2 + (center.y - centerY) ** 2;
                            if (dist < nearestDist) { nearestDist = dist; nearest = center; }
                        }
                        if (nearest) {
                            const dx = nearest.x - centerX;
                            const dy = nearest.y - centerY;
                            el.style.transform = `translate(${dx}px, ${dy}px) ${stackOffset}`;
                            el.style.opacity = '0.4';
                        } else {
                            el.classList.add('piece-enter-fade');
                        }
                    }
                });

                // 次のフレームでtransitionを有効化し、natural位置へ戻す（play）
                requestAnimationFrame(() => {
                    prepared.forEach(({ el, stackOffset }) => {
                        el.classList.add('piece-flip-transition');
                        el.style.transform = stackOffset;
                        el.style.opacity = '';
                        el.classList.remove('piece-enter-fade');
                    });

                    // transition終了後にクラス/インラインスタイルの後始末をして次回描画をクリーンにする
                    setTimeout(() => {
                        prepared.forEach(({ el, stackOffset }) => {
                            el.classList.remove('piece-flip-transition');
                            el.style.transform = stackOffset;
                            el.style.opacity = '';
                        });
                    }, 260);
                });
            }

            updateInfo() {
                const displayedState = this.gameData.moves[this.viewingTurnNumber];
                const latestState = this.gameData.moves[this.gameData.moves.length - 1];
                const stateForInfo = this.uiGameState !== 'IDLE' ? this.currentTurnState : displayedState;

                const { currentPlayer, summonCounts } = stateForInfo;
                const { maxSummons, timeControl } = this.gameData.meta.gameSettings;
                const isGameInProgress = this.gameData.meta.status === 'in_progress';
                const isViewingLatest = this.viewingTurnNumber === this.gameData.moves.length - 1;

                const { white: whiteUid, black: blackUid } = this.gameData.meta.players;
                const whiteProfile = this.playerProfiles.white;
                const blackProfile = this.playerProfiles.black;

                const whiteNickname = whiteProfile?.nickname || 'ゲスト';
                const blackNickname = blackProfile?.nickname || (blackUid === 0 ? '対戦相手待ち' : 'ゲスト');

                // 保存されるCPU対局では white/black が同一uid(人間)のため、CPU側は人間のプロフィールへリンクさせない
                const whiteIsCpuSlot = this.mode === 'cpu' && this.cpuPersisted && this.cpuColor === 'white';
                const blackIsCpuSlot = this.mode === 'cpu' && this.cpuPersisted && this.cpuColor === 'black';
                renderPlayerNameLink(document.getElementById('white-player-name'), whiteIsCpuSlot ? null : whiteUid, whiteNickname, 'プレイヤー1');
                renderPlayerNameLink(document.getElementById('black-player-name'), blackIsCpuSlot ? null : blackUid, blackNickname, 'プレイヤー2');

                // CPUモードでは humanColor から表示を決定する
                if (this.mode === 'cpu') {
                    if (this.humanColor === 'white') {
                        this.dom.playerColorIndicator.textContent = 'あなたは先手 (白) です';
                    } else {
                        this.dom.playerColorIndicator.textContent = 'あなたは後手 (黒) です';
                    }
                } else {
                    const myId = auth.currentUser ? auth.currentUser.uid : null;
                    // オンライン対戦の場合のみプレイヤーカラーを表示
                    if (this.mode === 'play' && myId && this.gameData.meta.players.white !== this.gameData.meta.players.black) {
                        const players = this.gameData.meta.players;
                        if (myId === players.white) {
                            this.dom.playerColorIndicator.textContent = 'あなたは先手 (白) です';
                        } else if (myId === players.black) {
                            this.dom.playerColorIndicator.textContent = 'あなたは後手 (黒) です';
                        }
                    } else {
                        this.dom.playerColorIndicator.textContent = '';
                    }
                }

                if (!timeControl.enabled) {
                    this.dom.whiteTimer.style.display = 'none';
                    this.dom.blackTimer.style.display = 'none';
                } else {
                    this.dom.whiteTimer.style.display = 'block';
                    this.dom.blackTimer.style.display = 'block';
                    
                    let timersToShow;
                    if (isGameInProgress) {
                        const timeWhenTurnStarted = latestState.timestamp;
                        const remainingTimeAtTurnStart = latestState.timers;
                        const { delay } = this.gameData.meta.gameSettings.timeControl;
                        const { currentPlayer } = latestState;

                        const estimatedServerTimeNow = Date.now() + this.serverTimeOffset;
                        const elapsedTimeMs = Math.max(0, estimatedServerTimeNow - timeWhenTurnStarted);
                        const elapsedTimeSec = Math.floor(elapsedTimeMs / 1000);
                        
                        const timeToDeduct = Math.max(0, elapsedTimeSec - delay);

                        timersToShow = { ...remainingTimeAtTurnStart };
                        timersToShow[currentPlayer] = Math.max(0, remainingTimeAtTurnStart[currentPlayer] - timeToDeduct);
                    } else {
                        timersToShow = displayedState.timers;
                    }
                    this.dom.whiteTimer.textContent = this.formatTime(timersToShow.white);
                    this.dom.blackTimer.textContent = this.formatTime(timersToShow.black);
                
                    this.dom.whiteTimer.classList.remove('bg-green-200');
                    this.dom.blackTimer.classList.remove('bg-green-200');
                    if (isGameInProgress) {
                        if (latestState.currentPlayer === 'white') {
                            this.dom.whiteTimer.classList.add('bg-green-200');
                        } else {
                            this.dom.blackTimer.classList.add('bg-green-200');
                        }
                    } else {
                        if (displayedState.currentPlayer === 'white') {
                            this.dom.whiteTimer.classList.add('bg-green-200');
                        } else {
                            this.dom.blackTimer.classList.add('bg-green-200');
                        }
                    }
                }

                this.dom.turnIndicator.textContent = `ターン: ${currentPlayer === 'white' ? '白' : '黒'}`;
                this.dom.whiteSummon.textContent = `${summonCounts.white} / ${maxSummons}`;
                this.dom.blackSummon.textContent = `${summonCounts.black} / ${maxSummons}`;
                
                // CPUモード: 人間の手番のときだけ操作可能。localモード(ホットシート)は常にどちらの手番でも操作可能
                const isPlayerTurn = (
                    this.mode === 'play' ||
                    this.mode === 'local' ||
                    (this.mode === 'cpu' && !this.cpuThinking && latestState.currentPlayer === this.humanColor)
                ) && isViewingLatest && isGameInProgress;
                const actionTaken = this.uiGameState === 'CONTINUOUS_MOVE' || this.uiGameState === 'ACTION_TAKEN' || (this.uiGameState === 'PIECE_SELECTED' && this.lastMoveDest !== null);
                
                this.dom.endTurnBtn.classList.toggle('hidden', !isPlayerTurn || !actionTaken);
                this.dom.cancelBtn.classList.toggle('hidden', !isPlayerTurn || !actionTaken);

                const isSummonPhaseOver = summonCounts.white === maxSummons && summonCounts.black === maxSummons;
                this.dom.actionModeToggle.classList.toggle('hidden', !isPlayerTurn || !isSummonPhaseOver || actionTaken);

                if (!isViewingLatest) this.setMessage('過去の盤面を表示中です。');
                else if (this.dom.message.textContent === '過去の盤面を表示中です。') this.setMessage('');
                
                if (this.mode === 'spectate') {
                    this.dom.exitBtnContainer.style.display = 'block';
                } else {
                    this.dom.exitBtnContainer.style.display = isGameInProgress ? 'none' : 'block';
                }
                this.dom.replayControls.style.display = 'flex';

                // --- 投了・引き分け提案セクションの表示制御 ---
                // 表示: 対局中・最新手閲覧かつ、本当の2人対戦オンライン / CPU / オフライン(ホットシート)のいずれか。
                const isHotseat = this.isHotseatGame();
                const showGameActions = isGameInProgress && isViewingLatest &&
                    (this.isRealOnlineGame() || isHotseat || this.mode === 'cpu');
                this.dom.gameActionSection.classList.toggle('hidden', !showGameActions);

                // 引き分け提案はCPU戦では非対応（ボタン自体を隠す）
                this.dom.drawBtn.classList.toggle('hidden', this.mode === 'cpu');

                // 操作できるのは「自分が操作できるターン」のみ。
                // オフライン(ホットシート)は両プレイヤーが同じ端末を操作するため常に有効。
                let actionsEnabled = false;
                if (isHotseat) {
                    actionsEnabled = true;
                } else if (this.mode === 'play') {
                    actionsEnabled = this.getMyColor() === latestState.currentPlayer;
                } else if (this.mode === 'cpu') {
                    actionsEnabled = !this.cpuThinking && latestState.currentPlayer === this.humanColor;
                }
                if (showGameActions) {
                    this.dom.resignBtn.disabled = !actionsEnabled;
                    // オンラインで自分の引き分け提案が保留中の間は「提案中…」表示を維持する
                    if (!this._myDrawOfferPending) {
                        this.dom.drawBtn.disabled = !actionsEnabled;
                    }
                } else {
                    this.dom.drawOfferStatus.classList.add('hidden');
                }

                // --- 再戦ボタンの表示制御 ---
                // 本当の2人対戦オンライン対局で、対局が終了しており、自分が参加者の場合のみ表示する
                const showRematch = this.isRealOnlineGame() && this.gameData.meta.status === 'completed' && !!this.getMyColor();
                this.dom.rematchBtn.classList.toggle('hidden', !showRematch);
            }

            highlight() {
                this.dom.board.querySelectorAll('.cell').forEach(c => c.classList.remove('selected', 'valid-move'));
                const isViewingLatest = this.viewingTurnNumber === this.gameData.moves.length - 1;
                if (!isViewingLatest || this.uiGameState !== 'PIECE_SELECTED' || !this.selectedCoords) return;

                const { r, c } = this.selectedCoords;
                const cell = this.dom.board.querySelector(`.cell[data-r='${r}'][data-c='${c}']`);
                if (cell) cell.classList.add('selected');

                this.getValidMoves(r, c).forEach(move => {
                    const moveCell = this.dom.board.querySelector(`.cell[data-r='${move.r}'][data-c='${move.c}']`);
                    if (moveCell) moveCell.classList.add('valid-move');
                });
            }

            updateReplayControls() {
                const maxTurn = this.gameData.moves.length - 1;
                this.dom.turnDisplay.textContent = `Turn ${this.viewingTurnNumber} / ${maxTurn}`;
                this.dom.firstMoveBtn.disabled = this.viewingTurnNumber === 0;
                this.dom.prevMoveBtn.disabled = this.viewingTurnNumber === 0;
                this.dom.nextMoveBtn.disabled = this.viewingTurnNumber === maxTurn;
                this.dom.lastMoveBtn.disabled = this.viewingTurnNumber === maxTurn;
            }

            resetUncommittedChanges() {
                // 操作中の変更がなければ何もしない
                if (this.uiGameState === 'IDLE') return;

                const latestMoveIndex = this.gameData.moves.length - 1;
                // 操作中の盤面を、最後に保存された状態に戻す
                this.currentTurnState = JSON.parse(JSON.stringify(this.gameData.moves[latestMoveIndex]));
                this.turnStartBoardState = JSON.parse(JSON.stringify(this.currentTurnState.board));
                this.turnActions = [];

                // UIの状態もリセットする
                this.uiGameState = 'IDLE';
                this.selectedCoords = null;
                this.lastMoveDest = null;
                this.setMessage('');
            }
            
            addEventListeners() {
                this.dom.board.addEventListener('click', this.handleBoardClick.bind(this));
                this.dom.endTurnBtn.addEventListener('click', this.endTurn.bind(this));
                this.dom.cancelBtn.addEventListener('click', this.cancelTurn.bind(this));
                
                document.querySelectorAll('input[name="actionMode"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        this.actionMode = e.target.value;
                        this.deselect();
                        this.setMessage(this.actionMode === 'MOVE' ? '移動する駒を選択してください。' : '排除する駒のあるマスを選択してください。');
                    });
                });

                this.dom.firstMoveBtn.addEventListener('click', () => { this.resetUncommittedChanges(); this.viewingTurnNumber = 0; this.render(); });
                this.dom.prevMoveBtn.addEventListener('click', () => { if (this.viewingTurnNumber > 0) { this.resetUncommittedChanges(); this.viewingTurnNumber--; this.render(); } });
                this.dom.nextMoveBtn.addEventListener('click', () => { if (this.viewingTurnNumber < this.gameData.moves.length - 1) { this.resetUncommittedChanges(); this.viewingTurnNumber++; this.render(); } });
                this.dom.lastMoveBtn.addEventListener('click', () => { this.resetUncommittedChanges(); this.viewingTurnNumber = this.gameData.moves.length - 1; this.render(); });

                this.dom.resignBtn.addEventListener('click', () => this.handleResignClick());
                this.dom.drawBtn.addEventListener('click', () => this.handleDrawOfferClick());
                this.dom.rematchBtn.addEventListener('click', () => this.handleRematchClick());

                const copyShareText = (text) => {
                    if (!text) return;
                    navigator.clipboard.writeText(text).then(() => {
                        this.dom.copyFeedbackFooter.textContent = 'コピーしました！';
                        setTimeout(() => { this.dom.copyFeedbackFooter.textContent = ''; }, 2000);
                    }).catch(() => {
                        this.dom.copyFeedbackFooter.textContent = 'コピーに失敗しました。';
                    });
                };
                this.dom.copyGameIdButton.addEventListener('click', () => {
                    copyShareText(this.dom.shareGameId.textContent.trim());
                });
                this.dom.copySpectateButton.addEventListener('click', () => {
                    copyShareText(this.dom.shareSpectateUrl.textContent.trim());
                });
            }

            handleBoardClick(e) {
                // CPUが思考中はクリックを無視
                if (this.cpuThinking) return;

                // --- 手番チェック ---
                const latestState = this.gameData.moves[this.gameData.moves.length - 1];
                const currentPlayerColor = latestState.currentPlayer;

                if (this.mode === 'cpu') {
                    // CPUモード: 人間の手番でなければ受け付けない
                    if (currentPlayerColor !== this.humanColor) {
                        this.setMessage('相手のターンです。');
                        return;
                    }
                } else if (this.mode === 'play') {
                    // オンライン対戦モード: 自分のUID一致チェック
                    const currentPlayerId = this.gameData.meta.players[currentPlayerColor];
                    const myId = auth.currentUser ? auth.currentUser.uid : null;
                    if (myId !== currentPlayerId) {
                        this.setMessage('相手のターンです。');
                        return;
                    }
                }
                // 'local'モード(未ログインのホットシート対戦)は同一端末を2人で共有するため
                // 手番の主体チェックを行わない（currentPlayerColorの手番なら誰でも操作可）

                const cell = e.target.closest('.cell');
                const isViewingLatest = this.viewingTurnNumber === this.gameData.moves.length - 1;
                // CPU/localモードでも 'play' と同じ操作フローを使う
                const isInteractiveMode = this.mode === 'play' || this.mode === 'cpu' || this.mode === 'local';
                if (!cell || this.gameData.meta.status !== 'in_progress' || !isViewingLatest || !isInteractiveMode) return;

                if (this.uiGameState === 'ACTION_TAKEN') {
                    this.setMessage('ターンを終了するか、キャンセルしてください。');
                    return;
                }
                const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
                const { maxSummons } = this.gameData.meta.gameSettings;
                const isSummonPhaseOver = this.currentTurnState.summonCounts.white === maxSummons && this.currentTurnState.summonCounts.black === maxSummons;

                if (isSummonPhaseOver && this.actionMode === 'ELIMINATE') this.handleEliminate(r, c);
                else if (this.uiGameState === 'IDLE' || this.uiGameState === 'CONTINUOUS_MOVE') this.handleSelection(r, c);
                else if (this.uiGameState === 'PIECE_SELECTED') this.handleMoveAction(r, c);
            }
            
            handleSelection(r, c) {
                const { currentPlayer, summonCounts } = this.currentTurnState;
                const { maxSummons } = this.gameData.meta.gameSettings;
                
                const stack = this.currentTurnState.board[r][c];
                const isEmpty = !Array.isArray(stack) || stack.length === 0;
                const isMyPieceOnTop = !isEmpty && stack[stack.length - 1] === currentPlayer;

                if (this.uiGameState === 'CONTINUOUS_MOVE') {
                     if (this.lastMoveDest.r !== r || this.lastMoveDest.c !== c) {
                        this.setMessage('連続移動は直前の移動先から行う必要があります。');
                        return;
                    }
                    if (isMyPieceOnTop) {
                        // 連続移動が可能か（自駒が2枚以上あるか）をチェック
                        let ownPiecesOnTop = 0;
                        for (let i = stack.length - 1; i >= 0; i--) {
                            if (stack[i] === currentPlayer) ownPiecesOnTop++;
                            else break;
                        }
                        if (ownPiecesOnTop > 1) {
                            this.selectPiece(r, c);
                        } else {
                            this.setMessage('ここからは連続移動できません。');
                        }
                    }
                    return;
                }
                
                if (isMyPieceOnTop) {
                    this.selectPiece(r, c);
                } else if (isEmpty && summonCounts[currentPlayer] < maxSummons) {
                    this.summon(r, c);
                }
            }

            handleMoveAction(r, c) {
                const isMoveValid = this.getValidMoves(this.selectedCoords.r, this.selectedCoords.c).some(m => m.r === r && m.c === c);
                if (isMoveValid) {
                    this.promptForPieceCount(this.selectedCoords.r, this.selectedCoords.c, r, c);
                } else if (this.selectedCoords.r === r && this.selectedCoords.c === c) {
                    this.deselect();
                } else {
                    this.setMessage('無効な移動先です。');
                }
            }

            summon(r, c) {
                const { currentPlayer } = this.currentTurnState;
                // マスがnullの場合、駒を置けるように空の配列で初期化する
                if (!Array.isArray(this.currentTurnState.board[r][c])) {
                    this.currentTurnState.board[r][c] = [];
                }
                this.currentTurnState.board[r][c].push(currentPlayer);
                this.currentTurnState.summonCounts[currentPlayer]++;
                this.turnActions.push({ type: 'summon', r, c });
                this.setMessage(`${currentPlayer === 'white' ? '白' : '黒'}が駒を召喚しました。`);
                this.uiGameState = 'ACTION_TAKEN';
                this.render();
            }

            move(startR, startC, endR, endC, pieceCount) {
                // ▼▼▼ 変更箇所 ▼▼▼
                // 移動先が空マス(0)の場合、駒を置けるように配列で初期化
                if (!Array.isArray(this.currentTurnState.board[endR][endC])) {
                    this.currentTurnState.board[endR][endC] = [];
                }
                // ▲▲▲ 変更箇所 ▲▲▲
                const piecesToMove = this.currentTurnState.board[startR][startC].splice(-pieceCount);
                this.currentTurnState.board[endR][endC].push(...piecesToMove);
                this.turnActions.push({
                    type: 'move',
                    from: { r: startR, c: startC },
                    to: { r: endR, c: endC },
                    count: pieceCount
                });

                // 移動元のマスに駒がなくなった場合、0 を代入してデータを保持する
                if (this.currentTurnState.board[startR][startC].length === 0) {
                    this.currentTurnState.board[startR][startC] = 0;
                }
                
                this.uiGameState = 'CONTINUOUS_MOVE';
                this.lastMoveDest = { r: endR, c: endC };
                this.selectedCoords = null;
                
                const { board, currentPlayer } = this.currentTurnState;
                const newStack = board[endR][endC];
                let ownPiecesOnTop = 0;
                for (let i = newStack.length - 1; i >= 0; i--) {
                    if (newStack[i] === currentPlayer) ownPiecesOnTop++;
                    else break;
                }

                // 連続移動が可能であれば、移動後の駒を自動で選択状態にする
                if (ownPiecesOnTop > 1) {
                    this.selectPiece(endR, endC);
                } else {
                    // 連続移動ができない場合は、選択を解除してターン終了を待つ
                    this.uiGameState = 'CONTINUOUS_MOVE';
                    this.selectedCoords = null;
                    this.setMessage('これ以上連続移動できません。');
                    this.render();
                }
            }

            handleEliminate(r, c) {
                const { board, currentPlayer } = this.currentTurnState;
                const stack = board[r][c];
                if (stack.length === 0 || stack[stack.length - 1] !== currentPlayer) {
                    this.setMessage('自分の駒が一番上にあるマスを選択してください。');
                    return;
                }

                let opponentPieceIndex = -1;
                for (let i = stack.length - 2; i >= 0; i--) {
                    if (stack[i] !== currentPlayer) {
                        opponentPieceIndex = i;
                        break;
                    }
                }
                
                if (opponentPieceIndex !== -1) {
                    this.currentTurnState.board[r][c].splice(opponentPieceIndex, 1);
                    this.turnActions.push({ type: 'eliminate', r, c });
                    this.setMessage(`${currentPlayer === 'white' ? '白' : '黒'}が相手の駒を排除しました。`);
                    this.uiGameState = 'ACTION_TAKEN';
                    this.render();
                } else {
                    this.setMessage('そのマスには排除できる相手の駒がありません。');
                }
            }
            
            async endTurn() {
                // 盤面状態がターン開始時と変わっていない場合（実質的なパス）はターン終了しない
                if (this.turnActions.length === 0 ||
                    JSON.stringify(this.turnStartBoardState) === JSON.stringify(this.currentTurnState.board)) {
                    this.setMessage('変更がありません。実質的なパスは禁止されています。');
                    return;
                }

                if (this.timerInterval) clearInterval(this.timerInterval);

                // ローカル対局(未ログインのCPU対局・オフラインのホットシート対戦): ローカルでターンをコミットする
                if (this.isLocalOnlyGame) {
                    this.commitTurnLocally(this.turnActions);
                    return;
                }

                const lastMove = this.gameData.moves[this.gameData.moves.length - 1];

                this.dom.endTurnBtn.disabled = true;
                this.dom.cancelBtn.disabled = true;

                try {
                    // 実際の盤面更新・勝敗判定はすべてサーバー側(submitMove)で検証・確定される。
                    // 成功すればonValueの購読を通じて確定済みの状態が自動的に反映される。
                    await submitMove({
                        gameId: this.gameId,
                        turnNumber: lastMove.turnNumber,
                        actions: this.turnActions
                    });
                } catch (error) {
                    console.error('Failed to submit move:', error);
                    this.setMessage(error.message || '手の送信に失敗しました。もう一度お試しください。');
                    this.resetUncommittedChanges();
                    this.viewingTurnNumber = this.gameData.moves.length - 1;
                    this.render();
                } finally {
                    this.dom.endTurnBtn.disabled = false;
                    this.dom.cancelBtn.disabled = false;
                }
            }

            /**
             * ローカル対局(未ログインのCPU対局・オフラインのホットシート対戦)用:
             * ターンをローカルの gameData に確定させる。
             * simulateTurn でアクションを検証→ moves に追記→勝敗判定→ handleDataUpdate を呼ぶ。
             * @param {object[]} actions - turnActions 形式のアクション配列
             */
            commitTurnLocally(actions) {
                const lastMove = this.gameData.moves[this.gameData.moves.length - 1];
                const { boardSize, maxSummons, timeControl } = this.gameData.meta.gameSettings;

                // normalizeBoard して simulateTurn に渡す（simulateTurn は内部で denormalize して返す）
                const normalizedBoard = normalizeBoard(lastMove.board, boardSize);
                const stateForSim = {
                    board: normalizedBoard,
                    summonCounts: { ...lastMove.summonCounts },
                    currentPlayer: lastMove.currentPlayer,
                    boardSize,
                };

                let result;
                try {
                    result = simulateTurn(stateForSim, actions);
                } catch (err) {
                    this.setMessage(err.message || '不正な手です。');
                    this.resetUncommittedChanges();
                    this.viewingTurnNumber = this.gameData.moves.length - 1;
                    this.render();
                    return;
                }

                // 次のプレイヤーを決定
                const nextPlayer = lastMove.currentPlayer === 'white' ? 'black' : 'white';

                // 時間設定が有効な場合、手番プレイヤーの残り時間をローカル時刻で計算する
                const newTimers = computeTimersAfterTurn(lastMove, timeControl, lastMove.currentPlayer, Date.now());

                // 新しい moves エントリを追加
                const newMove = {
                    turnNumber: lastMove.turnNumber + 1,
                    currentPlayer: nextPlayer,
                    board: result.board,         // simulateTurn は denormalized board を返す
                    summonCounts: result.summonCounts,
                    timers: newTimers,
                    timestamp: Date.now(),
                };
                this.gameData.moves.push(newMove);

                // 勝敗判定: 次のプレイヤーが手を持たないか確認
                // checkWinCondition は board が正規化済みであることを期待するので normalizeBoard する
                const nextNormalizedBoard = normalizeBoard(result.board, boardSize);
                const stateForWin = {
                    board: nextNormalizedBoard,
                    summonCounts: result.summonCounts,
                    currentPlayer: nextPlayer,
                    boardSize,
                };
                if (checkWinCondition(stateForWin, { maxSummons, boardSize })) {
                    // 勝者は手を打ったプレイヤー（= lastMove.currentPlayer）
                    const winner = lastMove.currentPlayer;
                    const loser = nextPlayer;
                    const winnerLabel = winner === 'white' ? '白' : '黒';
                    const loserLabel = loser === 'white' ? '白' : '黒';
                    // CPUモードでは勝者がプレイヤーかCPUかを併記する
                    const winnerSuffix = this.mode === 'cpu' ? `（${winner === this.humanColor ? 'あなた' : 'CPU'}）` : '';
                    this.gameData.meta.status = 'completed';
                    this.gameData.meta.winner = winner;
                    this.gameData.meta.winReason = `${winnerLabel}${winnerSuffix}の勝利！${loserLabel}に合法手がなくなりました。`;
                    this.gameData.meta.updatedAt = Date.now();
                }
