                // handleDataUpdate 経由で再描画（CPUターン起動も含む）
                this.handleDataUpdate(this.gameData);
            }

            /**
             * ローカル対局(未ログイン)で持ち時間切れが発生した際に、
             * サーバー(claimTimeout)を使わずその場で勝敗を確定させる。
             */
            claimLocalTimeout() {
                if (this.gameData.meta.status !== 'in_progress') return;
                const latestMove = this.gameData.moves[this.gameData.moves.length - 1];
                const loser = latestMove.currentPlayer;
                const winner = loser === 'white' ? 'black' : 'white';
                const winnerLabel = winner === 'white' ? '白' : '黒';
                const loserLabel = loser === 'white' ? '白' : '黒';
                const winnerSuffix = this.mode === 'cpu' ? `（${winner === this.humanColor ? 'あなた' : 'CPU'}）` : '';

                this.gameData.meta.status = 'completed';
                this.gameData.meta.winner = winner;
                this.gameData.meta.winReason = `${loserLabel}の時間切れです。${winnerLabel}${winnerSuffix}の勝利！`;
                this.gameData.meta.updatedAt = Date.now();

                this.handleDataUpdate(this.gameData);
            }

            /**
             * CPUの手番を Worker に依頼して、返答が来たらローカルコミットする。
             * 最低600msの待機時間を設けてゲーム感を演出する。
             */
            triggerCpuTurn() {
                if (this.cpuThinking) return; // 既に思考中なら二重起動しない
                this.cpuThinking = true;
                this.setMessage('CPUが考えています…');
                this.render(); // ボード操作ボタンを非表示にするため再描画

                const latestMove = this.gameData.moves[this.gameData.moves.length - 1];
                const { boardSize } = this.gameData.meta.gameSettings;
                const requestId = ++this.cpuRequestId;
                const sendTime = Date.now();

                this.cpuWorker.postMessage({
                    requestId,
                    state: {
                        board: latestMove.board,   // denormalized でも Worker 側で normalize する
                        summonCounts: latestMove.summonCounts,
                        currentPlayer: latestMove.currentPlayer,
                        boardSize,
                    },
                    level: this.cpuLevel,
                });

                // handleWorkerMessage 内で requestId チェックして処理する
                // sendTime は closure で参照される
                this._cpuSendTime = sendTime;
            }

            /**
             * Worker からの返答を処理する。
             */
            handleWorkerMessage(data) {
                const { requestId, turn, info, error } = data;

                // 古いリクエストの返答は無視する
                if (requestId !== this.cpuRequestId) return;

                const elapsed = Date.now() - (this._cpuSendTime || Date.now());
                const minDelay = 600; // ms: CPU が即座に返しても最低これだけ待つ
                const remainingDelay = Math.max(0, minDelay - elapsed);

                setTimeout(async () => {
                    if (error) {
                        this.cpuThinking = false;
                        console.error('AI Worker returned error:', error);
                        this.setMessage('CPUエラーが発生しました: ' + error);
                        this.render();
                        return;
                    }

                    if (!turn) {
                        // 合法手がない = CPU の負け（通常は checkWinCondition で先に検知されるはず）
                        this.cpuThinking = false;
                        this.setMessage('CPUに合法手がありません。');
                        this.render();
                        return;
                    }

                    // CPU のアクションを確定させる
                    this.setMessage(''); // 「CPUが考えています…」を消す
                    if (this.cpuPersisted) {
                        // 保存されるCPU対局: 人間の手と同じくsubmitMoveでサーバーに送信する
                        // (white/blackとも同一uidが操作しているため、CPUの色でも送信できる)。
                        // サーバー送信が終わるまではcpuThinkingを維持し、二重起動を防ぐ。
                        await this.submitCpuMove(turn.actions);
                        this.cpuThinking = false;
                    } else {
                        this.cpuThinking = false;
                        this.commitTurnLocally(turn.actions);
                    }
                }, remainingDelay);
            }

            /**
             * 保存されるCPU対局用: CPUが選んだ手をsubmitMove経由でサーバーに送信する。
             * 成功すればonValueの購読を通じて確定済みの状態が自動的に反映される。
             */
            async submitCpuMove(actions) {
                const lastMove = this.gameData.moves[this.gameData.moves.length - 1];
                try {
                    await submitMove({
                        gameId: this.gameId,
                        turnNumber: lastMove.turnNumber,
                        actions,
                    });
                } catch (error) {
                    console.error('Failed to submit CPU move:', error);
                    this.setMessage('CPUの手の送信に失敗しました。');
                    this.render();
                }
            }
            
            cancelTurn() {
                this.setMessage('操作をキャンセルしました。');
                this.resetUncommittedChanges();
                // キャンセル後は必ず最新の盤面を表示する
                this.viewingTurnNumber = this.gameData.moves.length - 1;
                this.render();
            }
            
            selectPiece(r, c) {
                this.uiGameState = 'PIECE_SELECTED';
                this.selectedCoords = { r, c };
                this.setMessage('移動先を選択してください。');
                this.render();
            }

            deselect() {
                this.uiGameState = this.lastMoveDest ? 'CONTINUOUS_MOVE' : 'IDLE';
                this.selectedCoords = null;
                this.setMessage('');
                this.render();
            }

            getValidMoves(r, c) {
                const moves = [];
                const { boardSize } = this.gameData.meta.gameSettings;
                const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                for (const [dr, dc] of directions) {
                    const newR = r + dr;
                    const newC = c + dc;
                    if (newR >= 0 && newR < boardSize && newC >= 0 && newC < boardSize) {
                        moves.push({ r: newR, c: newC });
                    }
                }
                return moves;
            }

            promptForPieceCount(startR, startC, endR, endC) {
                const { board, currentPlayer } = this.currentTurnState;
                const stack = board[startR][startC];
                let movablePiecesCount = 0;
                for (let i = stack.length - 1; i >= 0; i--) {
                    if (stack[i] === currentPlayer) movablePiecesCount++;
                    else break;
                }

                let maxMovable = movablePiecesCount;
                if (this.lastMoveDest) {
                    // 連続移動の場合、最低1枚は残す必要がある
                    maxMovable = movablePiecesCount - 1;
                }
                
                // 動かせる駒がない場合（連続移動で1枚しかない場合など）
                if (maxMovable <= 0) {
                     this.setMessage('連続移動では、自分の駒を1つ残す必要があります。');
                     this.deselect();
                     return;
                }
                
                // ▼▼▼ 変更箇所 ▼▼▼
                // 動かせる駒が1枚しかない場合はポップアップを表示せず移動
                if (maxMovable === 1) {
                    this.move(startR, startC, endR, endC, 1);
                    return;
                }

                // 動かせる駒が複数枚ある場合、<select>でポップアップ表示
                let options = '';
                for (let i = 1; i <= maxMovable; i++) {
                    // デフォルトで最大数を選択状態にする
                    const selected = i === maxMovable ? 'selected' : '';
                    options += `<option value="${i}" ${selected}>${i}個</option>`;
                }

                const modalContent = `
                    <p>移動する駒の数を選択してください。</p>
                    <select id="piece-count-select" class="w-full border p-2 rounded mt-2 bg-white text-lg">
                        ${options}
                    </select>
                `;
                
                this.showModal(
                    '移動する駒の数',
                    modalContent,
                    () => {
                        const pieceCount = parseInt(document.getElementById('piece-count-select').value);
                        // 念の為バリデーション
                        if (pieceCount > 0 && pieceCount <= maxMovable) {
                            this.move(startR, startC, endR, endC, pieceCount);
                        }
                    }
                );
                // ▲▲▲ 変更箇所 ▲▲▲
            }

            startTimer() {
                const latestTurnNumber = this.gameData.moves.length - 1;
                if (this.activeTimerTurnNumber === latestTurnNumber && this.timerInterval) {
                    return;
                }
                if (this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = null; 

                this.activeTimerTurnNumber = latestTurnNumber;
                
                this.timerInterval = setInterval(() => {
                    const latestState = this.gameData.moves[this.gameData.moves.length - 1];
                    if (this.gameData.meta.status !== 'in_progress') {
                        clearInterval(this.timerInterval); return;
                    }
                    
                    // --- 時間を計算してUIを更新 ---
                    const timeWhenTurnStarted = latestState.timestamp;
                    const remainingTimeAtTurnStart = latestState.timers[latestState.currentPlayer];
                    const { delay } = this.gameData.meta.gameSettings.timeControl;

                    const estimatedServerTimeNow = Date.now() + this.serverTimeOffset;
                    const elapsedTimeMs = Math.max(0, estimatedServerTimeNow - timeWhenTurnStarted);
                    const elapsedTimeSec = Math.floor(elapsedTimeMs / 1000);
                    
                    const timeToDeduct = Math.max(0, elapsedTimeSec - delay);
                    const currentRemainingTime = Math.max(0, remainingTimeAtTurnStart - timeToDeduct);

                    const timerDisplay = latestState.currentPlayer === 'white' ? this.dom.whiteTimer : this.dom.blackTimer;
                    timerDisplay.textContent = this.formatTime(currentRemainingTime);

                    // --- 時間切れチェック ---
                    if (currentRemainingTime <= 0) {
                        clearInterval(this.timerInterval);
                        if (this.isLocalOnlyGame) {
                            // ローカル対局はサーバーを介さずその場で勝敗を確定させる
                            this.claimLocalTimeout();
                        } else if (this.mode === 'play' || (this.mode === 'cpu' && this.cpuPersisted)) {
                            // 時間切れの確定はサーバー側(claimTimeout)が検証する。
                            // どちらのプレイヤーが呼んでも安全（後勝ちはサーバー側で弾かれる）。
                            claimTimeout({ gameId: this.gameId }).catch((error) => {
                                console.warn('claimTimeout failed (may already be resolved):', error);
                            });
                        }
                    }
                }, 500); // 描画頻度を少し上げる
            }
            
            // --- Utils ---
            formatTime(seconds) {
                if (typeof seconds !== 'number' || seconds < 0) seconds = 0;
                const min = Math.floor(seconds / 60);
                const sec = seconds % 60;
                return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
            }
            setMessage(msg) { this.dom.message.textContent = msg; }
            /**
             * モーダルを表示する。
             * options.cancelLabel / options.onCancel を指定すると、2ボタン（確認/キャンセル）の
             * 確認ダイアログとして機能する（例: 投了確認、引き分け提案の承諾/拒否）。
             */
            showModal(title, content, onConfirm, options = {}) {
                const { confirmLabel = 'OK', cancelLabel = null, onCancel = null } = options;

                // 直前の hideModal による遅延クローズをキャンセルし、閉じ状態のクラスも除去する。
                // （確認モーダル → 次のモーダルを同期的に開くケースで、閉じアニメーションが
                //  新しいモーダルを消してしまう競合を防ぐ）
                clearTimeout(this._hideModalTimer);
                this.dom.modal.classList.remove('hidden', 'opacity-0', 'scale-95');

                this.dom.modalTitle.textContent = title;
                this.dom.modalContent.innerHTML = content || '';
                this.dom.modalContent.style.display = content ? 'block' : 'none';

                const newButton = this.dom.modalBtn.cloneNode(true);
                this.dom.modalBtn.parentNode.replaceChild(newButton, this.dom.modalBtn);
                this.dom.modalBtn = newButton;
                this.dom.modalBtn.textContent = confirmLabel;

                this.dom.modalBtn.onclick = () => {
                    this.hideModal();
                    if (onConfirm) onConfirm();
                };

                const newCancelButton = this.dom.modalCancelBtn.cloneNode(true);
                this.dom.modalCancelBtn.parentNode.replaceChild(newCancelButton, this.dom.modalCancelBtn);
                this.dom.modalCancelBtn = newCancelButton;

                if (cancelLabel) {
                    this.dom.modalCancelBtn.textContent = cancelLabel;
                    this.dom.modalCancelBtn.classList.remove('hidden');
                    this.dom.modalCancelBtn.onclick = () => {
                        this.hideModal();
                        if (onCancel) onCancel();
                    };
                } else {
                    this.dom.modalCancelBtn.classList.add('hidden');
                    this.dom.modalCancelBtn.onclick = null;
                }

                this.dom.modal.classList.remove('hidden');
                setTimeout(() => this.dom.modal.classList.add('opacity-100', 'scale-100'), 10);
            }
            hideModal() {
                 this.dom.modal.classList.add('opacity-0', 'scale-95');
                 this.dom.modal.classList.remove('opacity-100', 'scale-100');
                 clearTimeout(this._hideModalTimer);
                 this._hideModalTimer = setTimeout(() => this.dom.modal.classList.add('hidden'), 300);
            }

            async fetchUserProfile(uid) {
                // 疑似UID（CPUモード用）はFirebaseにアクセスしない
                if (!uid || uid === 0 || uid === 'human' || uid === 'cpu') return null;
                const userRef = ref(database, `users/${uid}/profile`);
                const snapshot = await get(userRef);
                return snapshot.exists() ? snapshot.val() : null;
            }

            /**
             * ローカル対局(CPU/オフライン)の勝敗をその場で確定させる。
             * winner に null を渡すと引き分けになる。
             */
            finalizeLocalOutcome(winner, winReason) {
                if (this.gameData?.meta?.status !== 'in_progress') return;
                this.gameData.meta.status = 'completed';
                this.gameData.meta.winner = winner;
                this.gameData.meta.winReason = winReason;
                this.gameData.meta.updatedAt = Date.now();
                this.handleDataUpdate(this.gameData);
            }

            // --- 投了 ---
            handleResignClick() {
                if (this.gameData?.meta?.status !== 'in_progress') return;

                // オンライン（本当の2人対戦）: サーバー関数で確定
                if (this.mode === 'play' && this.isRealOnlineGame()) {
                    this.showModal(
                        '投了の確認',
                        '<p>本当に投了しますか？この操作は取り消せません。</p>',
                        async () => {
                            this.dom.resignBtn.disabled = true;
                            try {
                                await resignGame({ gameId: this.gameId });
                                // 成功後の画面更新は meta の onValue リスナー経由で自動反映される
                            } catch (error) {
                                console.error('Failed to resign:', error);
                                this.setMessage(error.message || '投了の送信に失敗しました。');
                                this.dom.resignBtn.disabled = false;
                            }
                        },
                        { confirmLabel: '投了する', cancelLabel: 'キャンセル' }
                    );
                    return;
                }

                // CPU対戦: 人間が投了 → CPUの勝ち（クライアント側で確定）
                if (this.mode === 'cpu') {
                    const winner = this.cpuColor;
                    const winnerLabel = winner === 'white' ? '白' : '黒';
                    this.showModal(
                        '投了の確認',
                        '<p>本当に投了しますか？この操作は取り消せません。</p>',
                        () => this.finalizeLocalOutcome(winner, `あなたの投了です。${winnerLabel}（CPU）の勝利！`),
                        { confirmLabel: '投了する', cancelLabel: 'キャンセル' }
                    );
                    return;
                }

                // オフライン(ホットシート): 手番のプレイヤーが投了 → 相手の勝ち
                // 未ログインlocal・ログイン済みオフライン(保存)の両方に対応
                if (this.isHotseatGame()) {
                    const latest = this.gameData.moves[this.gameData.moves.length - 1];
                    const loser = latest.currentPlayer;
                    const winner = loser === 'white' ? 'black' : 'white';
                    const loserLabel = loser === 'white' ? '白' : '黒';
                    const winnerLabel = winner === 'white' ? '白' : '黒';
                    this.showModal(
                        '投了の確認',
                        `<p>${loserLabel}が投了します。よろしいですか？</p>`,
                        () => this.finishHotseat(winner, `${loserLabel}が投了しました。${winnerLabel}の勝利！`),
                        { confirmLabel: '投了する', cancelLabel: 'キャンセル' }
                    );
                }
            }

            // --- 引き分け提案 ---
            handleDrawOfferClick() {
                if (this.gameData?.meta?.status !== 'in_progress') return;

                // オンライン（本当の2人対戦）: サーバー関数で提案を送信
                if (this.mode === 'play' && this.isRealOnlineGame()) {
                    this.showModal(
                        '引き分け提案の確認',
                        '<p>相手に引き分けを提案しますか？</p>',
                        async () => {
                            this.dom.drawBtn.disabled = true;
                            try {
                                await offerDraw({ gameId: this.gameId });
                                // 提案中インジケータは drawOffer の onValue リスナー経由で表示される
                            } catch (error) {
                                console.error('Failed to offer draw:', error);
                                this.setMessage(error.message || '引き分け提案の送信に失敗しました。');
                                this.dom.drawBtn.disabled = false;
                            }
                        },
                        { confirmLabel: '提案する', cancelLabel: 'キャンセル' }
                    );
                    return;
                }

                // オフライン(ホットシート): 手番プレイヤーが提案 → 相手に画面を見せて応答してもらう
                // 未ログインlocal・ログイン済みオフライン(保存)の両方に対応
                if (this.isHotseatGame()) {
                    const latest = this.gameData.moves[this.gameData.moves.length - 1];
                    const offerer = latest.currentPlayer;
                    const offererLabel = offerer === 'white' ? '白' : '黒';
                    const opponentLabel = offerer === 'white' ? '黒' : '白';
                    this.showModal(
                        '引き分け提案の確認',
                        `<p>${offererLabel}が引き分けを提案します。よろしいですか？</p>`,
                        () => {
                            // 提案確認後、相手に見せる応答モーダルを表示する
                            this.showModal(
                                '引き分けの提案',
                                `<p>${offererLabel}が引き分けを提案しました。<br>この画面を${opponentLabel}のプレイヤーに見せてください。</p>` +
                                `<p class="mt-3 font-semibold">${opponentLabel}のプレイヤー：引き分けを承諾しますか？</p>`,
                                () => this.finishHotseat(null, '合意により引き分けとなりました。'),
                                { confirmLabel: '承諾する', cancelLabel: '拒否する' }
                            );
                        },
                        { confirmLabel: '提案する', cancelLabel: 'キャンセル' }
                    );
                }
                // CPU対戦は引き分け提案に非対応（ボタン自体を非表示にしている）
            }

            // --- 再戦 ---
            async handleRematchClick() {
                if (this._rematchInProgress) return;
                if (!this.isRealOnlineGame()) return;
                const myColor = this.getMyColor();
                if (!myColor) return;

                const { uid: opponentUid } = this.getOpponentInfo();
                if (!opponentUid) {
                    this.setMessage('相手の情報が取得できませんでした。');
                    return;
                }

                this._rematchInProgress = true;
                this.dom.rematchBtn.disabled = true;
                const originalLabel = this.dom.rematchBtn.textContent;
                this.dom.rematchBtn.textContent = '作成中…';

                try {
                    const gameSettings = this.gameData.meta.gameSettings;
                    const settings = {
                        gameType: 'online',
                        boardSize: Number(gameSettings.boardSize),
                        // 前回と色を入れ替えて対戦する
                        playerColor: myColor === 'white' ? 'black' : 'white',
                    };

                    if (gameSettings.timeControl && gameSettings.timeControl.enabled) {
                        settings['time-control-enabled'] = 'on';
                        // サーバー側は秒単位、createGameは分単位（整数）を期待する
                        settings.timeLimit = Math.round(Number(gameSettings.timeControl.timeLimit) / 60);
                        settings.delay = Number(gameSettings.timeControl.delay);
                    }

                    const res = await createGame(settings);
                    const newGameId = res.data.gameId;

                    await createInvitation({ gameId: newGameId, targetUid: opponentUid });

                    window.location.href = 'waiting.html?id=' + newGameId;
                } catch (error) {
                    console.error('Failed to create rematch:', error);
                    this.setMessage(error.message || '再戦の作成に失敗しました。');
                    this.dom.rematchBtn.disabled = false;
                    this.dom.rematchBtn.textContent = originalLabel;
                    this._rematchInProgress = false;
                }
            }
        }
        
        const game = new GameManager();
        game.init();

        function playSound(sound) {
            sound.currentTime = 0; // 再生位置をリセット
            sound.play().catch(e => {
                // ユーザーがまだページを操作していない場合、再生は失敗することがある
                // コンソールにエラーは表示せず、失敗は無視する
            });
        }

    </script>
</body>
</html>
