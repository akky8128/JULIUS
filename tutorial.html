<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuliUs. - チュートリアル</title>
    <meta name="description" content="JuliUs.のインタラクティブチュートリアルで、ウケジャレイヤーの遊び方を学べます。">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192x192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
            touch-action: manipulation;
        }
        .board {
            display: grid;
            width: 100%;
            aspect-ratio: 1 / 1;
        }
        .cell { position: relative; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .cell.light { background-color: #f0d9b5; }
        .cell.dark { background-color: #b58863; }
        .piece { position: absolute; width: 75%; height: 75%; border-radius: 50%; cursor: pointer; transition: all 0.2s ease-in-out; box-sizing: border-box; box-shadow: inset 0 -4px 8px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.5); }
        .piece.white { background: radial-gradient(circle at 50% 30%, #ffffff, #cccccc); border: 2px solid #888; }
        .piece.black { background: radial-gradient(circle at 50% 30%, #555555, #111111); border: 2px solid #000; }
        .cell.selected { outline: 3px solid #3b82f6; outline-offset: -3px; }
        .cell.valid-move::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30%; height: 30%; background-color: rgba(59, 130, 246, 0.7); border-radius: 50%; pointer-events: none; z-index: 10; }
        .cell.tutorial-highlight { box-shadow: inset 0 0 0 3px rgba(250, 204, 21, 0.9); }

        .tutorial-coord-label {
            position: absolute;
            font-size: 10px;
            line-height: 1;
            color: rgba(0, 0, 0, 0.45);
            pointer-events: none;
            z-index: 20;
        }
        .tutorial-coord-col { bottom: 2px; right: 3px; }
        .tutorial-coord-row { top: 2px; left: 3px; }

        .kifu-scroll {
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
            mask-image: linear-gradient(to right, transparent, black 16px, black calc(100% - 16px), transparent);
        }
        .kifu-scroll::-webkit-scrollbar { display: none; }
        #kifu-text { padding: 0 16px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 50;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box { background: white; border-radius: 0.5rem; padding: 1.25rem; width: 90%; max-width: 320px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- ヘッダーの読み込み場所 -->
    <div id="header-placeholder"></div>

    <main class="container mx-auto px-4 py-6 max-w-xl">

        <!-- 進捗インジケーター -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-4 text-center">
            <p id="chapter-label" class="text-xs font-semibold text-blue-600 mb-1"></p>
            <p id="progress-text" class="font-bold text-sm text-gray-600">ステップ 1 / 1</p>
        </div>

        <!-- ガイドパネル -->
        <div id="guide-panel" class="bg-white rounded-lg shadow-md p-4 mb-4">
            <h2 id="guide-title" class="text-lg font-bold mb-2">チュートリアル</h2>
            <p id="guide-message" class="text-gray-700 leading-relaxed"></p>
            <p id="guide-success" class="hidden text-green-600 text-sm mt-2 font-semibold"></p>
            <p id="guide-wrong" class="hidden text-red-600 text-sm mt-2"></p>
            <div class="mt-3 flex justify-between items-center">
                <div class="flex space-x-2">
                    <button id="restart-button" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg shadow text-sm">
                        <i class="fas fa-rotate-left mr-1"></i>やり直す
                    </button>
                    <button id="reset-progress-button" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-lg shadow text-sm">
                        <i class="fas fa-backward-fast mr-1"></i>最初から
                    </button>
                </div>
                <button id="next-button" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow text-sm">
                    次へ<i class="fas fa-arrow-right ml-1"></i>
                </button>
            </div>
        </div>

        <!-- 移動/排除モード切替（両者の召喚が完了している章でのみ表示） -->
        <div id="action-mode-toggle" class="hidden bg-white rounded-lg shadow-md p-3 mb-4 flex text-sm font-bold text-center">
            <label class="flex-1 cursor-pointer">
                <input type="radio" name="tutorial-action-mode" value="move" class="sr-only peer" checked>
                <span class="block py-2 rounded-l-lg peer-checked:bg-blue-600 peer-checked:text-white bg-gray-100 text-gray-600">移動</span>
            </label>
            <label class="flex-1 cursor-pointer">
                <input type="radio" name="tutorial-action-mode" value="eliminate" class="sr-only peer">
                <span class="block py-2 rounded-r-lg peer-checked:bg-red-600 peer-checked:text-white bg-gray-100 text-gray-600">排除</span>
            </label>
        </div>

        <!-- 盤面 -->
        <div id="board" class="board rounded-md overflow-hidden shadow-md"></div>

        <!-- 操作パネル -->
        <div id="controls-panel" class="bg-white rounded-lg shadow-md p-4 mt-4">
            <div id="action-buttons" class="flex space-x-2">
                <button id="cancel-button" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg shadow">キャンセル</button>
                <button id="end-turn-button" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg shadow">
                    <i class="fas fa-check mr-1"></i>ターン終了
                </button>
            </div>
        </div>

        <!-- 棋譜表示セクション -->
        <div id="kifu-section" class="bg-white rounded-lg shadow-md p-3 mt-4">
            <div id="kifu-scroll" class="kifu-scroll">
                <span id="kifu-text" class="font-mono text-sm text-gray-700"></span>
            </div>
        </div>

        <!-- チュートリアル完了パネル（最終ステップでのみ表示） -->
        <div id="completion-panel" class="hidden bg-white rounded-lg shadow-md p-6 mt-4 text-center space-y-4">
            <p class="text-lg font-bold text-green-600"><i class="fas fa-circle-check mr-1"></i>チュートリアル完了！</p>
            <div class="flex flex-col sm:flex-row justify-center gap-3">
                <a href="index.html" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-lg transition">トップページに戻る</a>
                <a href="create.html" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition">対局を作成</a>
            </div>
        </div>

    </main>

    <!-- 枚数選択モーダル -->
    <div id="count-modal-overlay" class="modal-overlay hidden">
        <div class="modal-box">
            <p class="mb-2 font-semibold">移動する駒の数</p>
            <p class="text-sm text-gray-600 mb-2">移動する駒の数を選択してください。</p>
            <select id="piece-count-select" class="w-full border p-2 rounded mt-1 bg-white text-lg"></select>
            <div class="mt-4 flex space-x-2">
                <button id="count-cancel-button" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg">キャンセル</button>
                <button id="count-confirm-button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">決定</button>
            </div>
        </div>
    </div>

    <!-- フッター -->
    <div id="footer-placeholder"></div>

    <script type="module">
        import { loadHeader } from './js/header.js';
        import { loadFooter } from './js/footer.js';
        import { TutorialEngine } from './js/tutorial/engine.js';
        import { scenarios } from './js/tutorial/scenarios.js';

        loadHeader();
        loadFooter();

        // 進捗の保存キー（engine.js の STORAGE_KEY と一致させること）。
        const PROGRESS_KEY = 'julius-tutorial-progress';

        // URL に ?reset が付いていたら、保存済み進捗を消してステップ1から始める。
        // デバッグや「最初からやり直したい」ケース向け。
        try {
            if (new URLSearchParams(location.search).has('reset')) {
                localStorage.removeItem(PROGRESS_KEY);
            }
        } catch (_) { /* localStorage 不可の環境は無視 */ }

        const boardEl = document.getElementById('board');
        const chapterLabel = document.getElementById('chapter-label');
        const progressText = document.getElementById('progress-text');
        const guideTitle = document.getElementById('guide-title');
        const guideMessage = document.getElementById('guide-message');
        const guideSuccess = document.getElementById('guide-success');
        const guideWrong = document.getElementById('guide-wrong');
        const kifuText = document.getElementById('kifu-text');
        const restartButton = document.getElementById('restart-button');
        const resetProgressButton = document.getElementById('reset-progress-button');
        const cancelButton = document.getElementById('cancel-button');
        const nextButton = document.getElementById('next-button');
        const endTurnButton = document.getElementById('end-turn-button');
        const actionModeToggle = document.getElementById('action-mode-toggle');
        const actionModeRadios = document.querySelectorAll('input[name="tutorial-action-mode"]');
        const controlsPanel = document.getElementById('controls-panel');
        const completionPanel = document.getElementById('completion-panel');

        const countModalOverlay = document.getElementById('count-modal-overlay');
        const pieceCountSelect = document.getElementById('piece-count-select');
        const countCancelButton = document.getElementById('count-cancel-button');
        const countConfirmButton = document.getElementById('count-confirm-button');

        const kifuTokens = [];

        // 枚数選択モーダルを表示し、選択結果をPromiseで返す。
        // キャンセル時は null を返す（game.htmlのpromptForPieceCountと同様の挙動）。
        function promptCount(max) {
            return new Promise((resolve) => {
                pieceCountSelect.innerHTML = '';
                for (let i = 1; i <= max; i++) {
                    const option = document.createElement('option');
                    option.value = String(i);
                    option.textContent = `${i}個`;
                    if (i === max) option.selected = true;
                    pieceCountSelect.appendChild(option);
                }
                countModalOverlay.classList.remove('hidden');

                const cleanup = () => {
                    countModalOverlay.classList.add('hidden');
                    countConfirmButton.removeEventListener('click', onConfirm);
                    countCancelButton.removeEventListener('click', onCancel);
                };
                const onConfirm = () => {
                    const value = parseInt(pieceCountSelect.value, 10);
                    cleanup();
                    resolve(value > 0 && value <= max ? value : null);
                };
                const onCancel = () => {
                    cleanup();
                    resolve(null);
                };
                countConfirmButton.addEventListener('click', onConfirm);
                countCancelButton.addEventListener('click', onCancel);
            });
        }

        function updateActionButtons() {
            // 最終ステップ（締め）では操作パネルを隠し、完了パネル（2ボタン）を表示する。
            const isFinal = engine.isFinalStep;
            completionPanel.classList.toggle('hidden', !isFinal);
            controlsPanel.classList.toggle('hidden', isFinal);

            // 「次へ」は解説ステップ、または座標タップに正解済みのときに出す。
            nextButton.classList.toggle('hidden', !engine.canProceed);
            endTurnButton.classList.toggle('hidden', engine.isInfoStep || !engine.canEndTurn);
            const showModeToggle = !engine.isInfoStep && engine.canToggleEliminateMode;
            actionModeToggle.classList.toggle('hidden', !showModeToggle);
            if (showModeToggle) {
                actionModeRadios.forEach((radio) => {
                    radio.checked = radio.value === engine.actionMode;
                });
            }
        }

        const engine = new TutorialEngine({
            boardEl,
            scenarios,
            promptCount,
            onProgress: (step, total) => {
                progressText.textContent = `ステップ ${step} / ${total}`;
            },
            onMessage: (scenario) => {
                chapterLabel.textContent = scenario.chapterTitle
                    ? `第${scenario.chapter}章 ${scenario.chapterTitle}`
                    : '';
                guideTitle.textContent = scenario.title || 'チュートリアル';
                guideMessage.textContent = scenario.message || '';
                guideWrong.classList.add('hidden');
                guideWrong.textContent = '';
                guideSuccess.classList.add('hidden');
                guideSuccess.textContent = '';
                updateActionButtons();
            },
            onKifu: (notation) => {
                if (notation) kifuTokens.push(notation);
                kifuText.textContent = kifuTokens.join(' ');
            },
            onWrong: (message) => {
                guideWrong.textContent = message;
                guideWrong.classList.remove('hidden');
                updateActionButtons();
            },
            onSuccess: (message) => {
                guideSuccess.textContent = message;
                guideSuccess.classList.remove('hidden');
            },
        });

        restartButton.addEventListener('click', () => {
            engine.restart();
            updateActionButtons();
        });
        // 「最初から」: 進捗を消してステップ1から再開する（棋譜もクリアするため再読み込み）。
        resetProgressButton.addEventListener('click', () => {
            try { localStorage.removeItem(PROGRESS_KEY); } catch (_) { /* 無視 */ }
            location.reload();
        });
        cancelButton.addEventListener('click', () => {
            engine.cancel();
            updateActionButtons();
        });
        nextButton.addEventListener('click', () => {
            engine.next();
        });
        endTurnButton.addEventListener('click', () => {
            engine.endTurn();
            updateActionButtons();
        });
        actionModeRadios.forEach((radio) => {
            radio.addEventListener('change', (e) => {
                engine.setActionMode(e.target.value);
                updateActionButtons();
            });
        });
        engine.start();
        updateActionButtons();
    </script>
</body>
</html>
